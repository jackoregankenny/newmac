# ============================================================
#  catalog.toml — CANONICAL catalog for newmac.
#  Read by the Rust core crate (ui/crates/newmac-core).
#  scripts/catalog.sh is GENERATED from this file:
#      newmac-ui catalog gen-sh
#  Edit here, then regenerate. Keep names apostrophe-free is no
#  longer required (TOML quotes handle it) but the generated .sh
#  still is, so avoid apostrophes to keep bash happy.
# ============================================================

schema = 1

