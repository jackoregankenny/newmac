# ~/.tmux.conf — minimal, sane tmux

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g status-position top

# Prefix: Ctrl-a (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "reloaded"

# Catppuccin-ish status bar
set -g status-style "bg=#1e1e2e fg=#cdd6f4"
set -g status-left "#[bg=#a6e3a1,fg=#11111b,bold] #S #[bg=#1e1e2e] "
set -g status-right "#[fg=#fab387]%H:%M #[fg=#94e2d5]%d-%b "
setw -g window-status-current-style "bg=#fab387,fg=#11111b,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
