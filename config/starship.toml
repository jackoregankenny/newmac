# ~/.config/starship.toml — themed prompt (palette switched by scripts/theme.sh)
# Needs a Nerd Font (JetBrainsMono Nerd Font is installed by the Brewfile).
#
# Colours are semantic names resolved through [palettes.<id>] below.
# scripts/theme.sh rewrites the `palette = "…"` selector line — do not
# rename it or add another line starting with `palette = `.

add_newline = true
command_timeout = 1000

format = """
[](surface)\
$os\
$username\
[](bg:accent fg:surface)\
$directory\
[](fg:accent bg:green)\
$git_branch\
$git_status\
[](fg:green bg:accent2)\
$nodejs\
$rust\
$golang\
$bun\
[](fg:accent2 bg:surface)\
$cmd_duration\
[ ](fg:surface)\
$line_break\
$character"""

palette = "tokyonight"

[os]
disabled = false
style = "bg:surface fg:text"

[os.symbols]
Macos = "󰀵 "

[username]
show_always = false
style_user = "bg:surface fg:text"
format = '[ $user ]($style)'

[directory]
style = "fg:base bg:accent"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Code" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:green"
format = '[[ $symbol $branch ](fg:base bg:green)]($style)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:base bg:green)]($style)'

[nodejs]
symbol = ""
style = "bg:accent2"
format = '[[ $symbol( $version) ](fg:base bg:accent2)]($style)'

[rust]
symbol = ""
style = "bg:accent2"
format = '[[ $symbol( $version) ](fg:base bg:accent2)]($style)'

[golang]
symbol = ""
style = "bg:accent2"
format = '[[ $symbol( $version) ](fg:base bg:accent2)]($style)'

[bun]
symbol = "🥟"
style = "bg:accent2"
format = '[[ $symbol( $version) ](fg:base bg:accent2)]($style)'

[cmd_duration]
min_time = 500
style = "fg:text bg:surface"
format = '[  $duration ]($style)'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

